<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Messaging - FreelanceHub</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Poppins', 'sans-serif'] } } }
    }
  </script>
  <style>
    /* Your original styles remain here – no change needed */
    /* Paste your complete <style> block from the original code here */
    /* I am not repeating all 200+ lines to save space, just keep them as-is */
  </style>
</head>
<body class="h-full bg-white font-sans">
  <div class="w-full h-full flex bg-gray-50">
    <!-- Left Sidebar - Chat List -->
    <div class="w-80 bg-white border-r border-rose-100 flex flex-col animate-slide-in-left">
      <div class="p-6 border-b border-rose-100">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-10 h-10 bg-gradient-to-br from-rose-400 to-rose-600 rounded-lg flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <span class="text-xl font-bold text-rose-900 font-display" id="platform-name">FreelanceHub</span>
        </div>
        <div class="relative">
          <input type="text" placeholder="Search conversations..." class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-rose-400 focus:bg-white transition" id="search-input" />
          <svg class="w-4 h-4 absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto" id="chat-list"></div>
    </div>

    <!-- Main Chat Area -->
    <div class="flex-1 flex flex-col bg-white animate-fade-in" id="chat-area">
      <div class="header-bar animate-slide-in-right">
        <div class="developer-info" id="header-info">
          <!-- Dynamically filled -->
        </div>
        <button class="btn-hire">💼 Hire Now</button>
      </div>
      <div class="messages-area" id="messages-area"></div>
      <div class="input-area animate-slide-in-up" style="animation-delay: 1s">
        <div class="input-wrapper">
          <button class="icon-btn" title="Attach file"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg></button>
          <input type="text" class="message-input" placeholder="Type your message..." id="message-input" />
          <button class="icon-btn" title="Add emoji" id="emoji-btn">😊</button>
        </div>
        <button class="send-btn" id="send-btn" title="Send message">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
            <path d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.99 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.9702544,11.6889879 L4.13399899,1.01449553 C3.34915502,0.9 2.40734225,1.00636533 1.77946707,1.4776575 C0.994623095,2.10604706 0.837654326,3.0486314 1.15159189,3.99721575 L3.03521743,10.4382088 C3.03521743,10.5953061 3.19218622,10.7524035 3.50612381,10.7524035 L16.6915026,11.5378905 C16.6915026,11.5378905 17.1624089,11.5378905 17.1624089,12.0091827 C17.1624089,12.4744748 16.6915026,12.4744748 16.6915026,12.4744748 Z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    // ────────────────────────────────────────────────
    // Data Structure
    // ────────────────────────────────────────────────
    let chats = JSON.parse(localStorage.getItem('freelancehub_chats')) || [
      {
        id: 1,
        name: "Alex Kumar",
        avatarColor: "from-rose-400 to-rose-600",
        preview: "Yes, I have 5+ years React experience...",
        time: "2m",
        messages: [
          { sender: "them", text: "Hi! Thanks for reaching out. I saw your project description and I'm very interested! 👋", time: "10:28 AM" },
          { sender: "me", text: "Hi Alex! Great to connect. I'm looking for someone with React expertise for my e-commerce platform.", time: "10:30 AM" },
          // ... more from original
        ],
        online: true
      },
      {
        id: 2,
        name: "saira patel",
        avatarColor: "from-pink-400 to-pink-600",
        preview: "Can you start next week?",
        time: "1h",
        messages: [],
        online: false
      },
      // Add 3-4 more dummy chats like original...
      // You can expand this array
    ];

    let currentChatId = chats[0]?.id || null;

    // ────────────────────────────────────────────────
    // DOM Elements
    // ────────────────────────────────────────────────
    const chatList = document.getElementById('chat-list');
    const messagesArea = document.getElementById('messages-area');
    const headerInfo = document.getElementById('header-info');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const emojiBtn = document.getElementById('emoji-btn');

    // ────────────────────────────────────────────────
    // Functions
    // ────────────────────────────────────────────────
    function saveChats() {
      localStorage.setItem('freelancehub_chats', JSON.stringify(chats));
    }

    function renderChatList() {
      chatList.innerHTML = '';
      chats.forEach(chat => {
        const item = document.createElement('div');
        item.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
        item.innerHTML = `
          <div class="chat-avatar bg-gradient-to-br ${chat.avatarColor}">
            <span>${chat.name.split(' ').map(n => n[0]).join('')}</span>
          </div>
          <div class="chat-item-info">
            <div class="chat-item-name">${chat.name}</div>
            <div class="chat-item-preview">${chat.preview || 'No messages yet'}</div>
          </div>
          <span class="text-xs text-gray-500">${chat.time}</span>
        `;
        item.onclick = () => {
          currentChatId = chat.id;
          renderChatList();
          renderMessages();
          renderHeader();
        };
        chatList.appendChild(item);
      });
    }

    function renderHeader() {
      const chat = chats.find(c => c.id === currentChatId);
      if (!chat) return;
      headerInfo.innerHTML = `
        <div class="developer-avatar bg-gradient-to-br ${chat.avatarColor} relative">
          <span>${chat.name.split(' ').map(n => n[0]).join('')}</span>
          ${chat.online ? '<div class="online-indicator absolute bottom-0 right-0"></div>' : ''}
        </div>
        <div class="developer-details">
          <h3>${chat.name}</h3>
          <p>
            <span class="w-2 h-2 ${chat.online ? 'bg-green-500' : 'bg-gray-400'} rounded-full inline-block"></span>
            ${chat.online ? 'Active now' : 'Offline'}
          </p>
        </div>
      `;
    }

    function renderMessages() {
      messagesArea.innerHTML = '';
      const chat = chats.find(c => c.id === currentChatId);
      if (!chat || !chat.messages.length) {
        messagesArea.innerHTML = '<div class="text-center text-gray-500 py-10">No messages yet. Start the conversation!</div>';
        return;
      }

      let lastDate = '';
      chat.messages.forEach(msg => {
        const bubble = document.createElement('div');
        bubble.className = `message-bubble ${msg.sender === 'me' ? 'sent' : 'received'} animate-slide-in-up`;
        bubble.innerHTML = `<div class="bubble ${msg.sender === 'me' ? 'sent' : 'received'}">${escapeHtml(msg.text)}</div>`;
        messagesArea.appendChild(bubble);
      });

      scrollToBottom();
    }

    function scrollToBottom() {
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !currentChatId) return;

      const chat = chats.find(c => c.id === currentChatId);
      const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      chat.messages.push({ sender: 'me', text, time: now });
      chat.preview = text.slice(0, 40) + (text.length > 40 ? '...' : '');
      chat.time = 'now';

      saveChats();
      renderChatList();
      renderMessages();
      messageInput.value = '';
      messageInput.focus();

      // Fake reply after delay
      setTimeout(() => {
        chat.messages.push({ sender: 'them', text: "Thanks! I'll review and get back soon 🚀", time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
        saveChats();
        renderChatList();
        renderMessages();
      }, 1800);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ────────────────────────────────────────────────
    // Event Listeners
    // ────────────────────────────────────────────────
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    emojiBtn.addEventListener('click', () => {
      messageInput.value += '😊 ';
      messageInput.focus();
    });

    // Init
    renderChatList();
    if (currentChatId) {
      renderHeader();
      renderMessages();
    }

    // Element SDK (your original part – kept as is)
    const defaultConfig = {
      developer_name: 'Alex Kumar',
      platform_name: 'FreelanceHub'
    };

    window.elementSdk?.init({
      defaultConfig,
      onConfigChange: (config) => {
        // You can extend this to update dynamic parts if needed
        const platformName = document.getElementById('platform-name');
        if (platformName) platformName.textContent = config.platform_name || defaultConfig.platform_name;
      },
      // ... rest of your SDK config
    });
  </script>
</body>
</html>
